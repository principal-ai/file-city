name: Quality Lens Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Quality Lens CLI
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc
          bun add -g @principal-ai/quality-lens-cli

      - name: Run quality lenses
        run: |
          quality-lens run . \
            --output results.json \
            --format json
        continue-on-error: true

      - name: Display results summary
        if: always()
        run: |
          if [ -f results.json ]; then
            echo "Quality Lens Analysis Complete"
            node -e "
              const fs = require('fs');
              const results = JSON.parse(fs.readFileSync('results.json', 'utf8'));
              const total = results.results.length;
              const passed = results.results.filter(r => r.execution?.success).length;
              console.log('Total Checks:', total);
              console.log('Passed:', passed);
              console.log('Failed:', total - passed);
            "
          fi

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-lens-results-${{ github.sha }}
          path: results.json
          if-no-files-found: warn
